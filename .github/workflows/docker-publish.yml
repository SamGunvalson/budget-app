name: Build & Publish Docker Image

# Triggers:
#   - Push to main        → bumps patch version, pushes 'edge' + versioned + 'latest' images in one run
#   - Push a semver tag   → builds full semver image set (for manual version overrides)
#   - Pull request        → build-only smoke test (no push)
on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # e.g. v1.0.0, v2.3.1
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/budget-app

jobs:
  # ── 1. Quality gates ───────────────────────────────────────────────────────
  audit:
    name: Security & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint

  # ── 2. Build & push ────────────────────────────────────────────────────────
  build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: audit
    permissions:
      contents: write   # required to create the version tag

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history required for version calculation

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # On main pushes: calculate and create the next patch tag (e.g. v0.0.1 → v0.0.2).
      # The output is consumed directly below — no re-trigger needed, no GITHUB_TOKEN loop issue.
      - name: Auto-bump version tag
        id: bump
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      # Derive image tags:
      #   main push   →  edge  +  v0.0.2  +  latest  +  sha-abc1234
      #   tag push    →  1.2.3  +  1.2  +  1  +  latest  +  sha-abc1234
      #   PR          →  sha-abc1234 (build only, not pushed)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.bump.outputs.new_tag }},enable=${{ steps.bump.outputs.new_tag != '' }}
            type=raw,value=latest,enable=${{ steps.bump.outputs.new_tag != '' || startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=Budget App
            org.opencontainers.image.description=Personal budget tracker with offline support
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build (and push if not a PR)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          # Credentials are NOT baked in — injected at runtime by docker-entrypoint.sh
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Docker Scout CVE scan ───────────────────────────────────────────────
  scout:
    name: Docker Scout CVE Scan
    runs-on: ubuntu-latest
    needs: build-push
    # Only scan after a real push (image must be in the registry)
    if: github.event_name == 'push'
    permissions:
      security-events: write   # upload SARIF to GitHub Security tab
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout - scan edge image for CVEs
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.IMAGE_NAME }}:edge
          # Fail the workflow only on critical CVEs that have a fix available,
          # so a missed upgrade in the Dockerfile blocks the release immediately.
          only-severities: critical
          only-fixed: true
          exit-code: true
          sarif-file: scout-results.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()   # upload even when the scan step fails
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scout-results.sarif

