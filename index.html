<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Budget App</title>

    <!-- PWA -->
    <meta name="theme-color" content="#1c1917" />
    <meta name="description" content="Personal budget tracker with offline support" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Budget" />

    <!-- Runtime environment config (placeholders replaced by docker-entrypoint.sh in production) -->
    <script src="/env-config.js"></script>

    <!-- Phase 7: App Shell colors that respect system dark mode preference -->
    <style>
      #app-shell { --shell-bg: linear-gradient(to bottom right,#fafaf9,#fffbeb20,#f5f5f4); --shell-nav-bg: rgba(255,255,255,.8); --shell-nav-border: rgba(214,211,209,.6); --shell-text: #1c1917; --shell-block: rgba(214,211,209,.4); }
      @media (prefers-color-scheme: dark) {
        #app-shell { --shell-bg: linear-gradient(to bottom right,#0c0a09,#1c1917,#0c0a09); --shell-nav-bg: rgba(28,25,23,.8); --shell-nav-border: rgba(68,64,60,.6); --shell-text: #f5f5f4; --shell-block: rgba(68,64,60,.5); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!--
        Phase 7 — App Shell.
        Rendered instantly from the service-worker precache before React
        hydrates. React's createRoot().render() replaces this content
        once the JS bundles execute. The shell matches the TopBar + page
        skeleton layout so there is zero layout shift.
      -->
      <div id="app-shell" style="min-height:100vh;background:var(--shell-bg)">
        <!-- TopBar placeholder -->
        <nav style="position:sticky;top:0;z-index:10;height:56px;border-bottom:1px solid var(--shell-nav-border);background:var(--shell-nav-bg);backdrop-filter:blur(12px);display:flex;align-items:center;padding:0 16px">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:36px;height:36px;border-radius:12px;background:linear-gradient(to bottom right,#fbbf24,#d97706);display:flex;align-items:center;justify-content:center">
              <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#fff">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <span style="font-weight:700;font-size:18px;color:var(--shell-text);font-family:system-ui,sans-serif">Budget App</span>
          </div>
        </nav>
        <!-- Skeleton body -->
        <div style="max-width:56rem;margin:0 auto;padding:32px 16px">
          <div style="height:40px;width:224px;border-radius:12px;background:var(--shell-block);margin-bottom:24px"></div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px">
            <div style="height:80px;border-radius:12px;background:var(--shell-block)"></div>
            <div style="height:80px;border-radius:12px;background:var(--shell-block)"></div>
            <div style="height:80px;border-radius:12px;background:var(--shell-block)"></div>
          </div>
          <div style="height:56px;border-radius:12px;background:var(--shell-block);margin-bottom:12px"></div>
          <div style="height:56px;border-radius:12px;background:var(--shell-block);margin-bottom:12px"></div>
          <div style="height:56px;border-radius:12px;background:var(--shell-block);margin-bottom:12px"></div>
          <div style="height:56px;border-radius:12px;background:var(--shell-block);margin-bottom:12px"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
