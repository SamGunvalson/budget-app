server {
    listen 8085;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──
    add_header X-Content-Type-Options        "nosniff"                          always;
    add_header X-Frame-Options               "DENY"                             always;
    add_header X-XSS-Protection              "1; mode=block"                    always;
    add_header Referrer-Policy               "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy            "geolocation=(), microphone=(), camera=()" always;
    # HSTS — only meaningful when served over TLS (ensure your reverse proxy / CDN enforces HTTPS)
    add_header Strict-Transport-Security     "max-age=31536000; includeSubDomains" always;
    # CSP — tightened to same-origin for scripts; Supabase API calls allowed; inline styles
    # required by Tailwind at runtime; wasm-unsafe-eval required by ExcelJS WASM path
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; img-src 'self' data:; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
        always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        application/xml
        image/svg+xml;

    # Service worker — must never be cached or PWA updates won't propagate
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # Web app manifest
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { application/manifest+json webmanifest; }
        try_files $uri =404;
    }

    # Hashed assets — immutable, long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Workbox precache assets (also hashed)
    location /workbox- {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — never cache (so new deploys are picked up)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback — send all routes to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access log for favicon/robots to reduce noise
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
