// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.3.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

// Gradle 9/10 compatibility: make Android version vars explicit on each subproject
// so plugin scripts don't rely on implicit parent-property lookup.
def androidExtKeys = [
    'minSdkVersion',
    'compileSdkVersion',
    'targetSdkVersion',
    'androidxActivityVersion',
    'androidxAppCompatVersion',
    'androidxCoordinatorLayoutVersion',
    'androidxCoreVersion',
    'androidxFragmentVersion',
    'coreSplashScreenVersion',
    'androidxWebkitVersion',
    'junitVersion',
    'androidxJunitVersion',
    'androidxEspressoCoreVersion',
    'cordovaAndroidVersion',
]
subprojects { subproject ->
    androidExtKeys.each { key ->
        if (rootProject.ext.has(key) && !subproject.ext.has(key)) {
            subproject.ext.set(key, rootProject.ext.get(key))
        }
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
